<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Actualizar Usuario</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='CSS/admin.css') }}">
    <link rel="shortcut icon" href="../static/IMG/grafico.png" type="image/x-icon">
</head>
<body>
    {% include 'navbar.html' %}

    <div class="form-container">
        <h2>Actualizar Usuario</h2>
        <form action="{{ url_for('actualizar_usuario', id=usuario.id) }}" method="POST">
            <div class="form-group">
                <label for="nombre">Nombre:</label>
                <input type="text" name="nombre" value="{{ usuario.nombre }}" required>
            </div>

            <div class="form-group">
                <label for="apellido">Apellido:</label>
                <input type="text" name="apellido" value="{{ usuario.apellido }}" required>
            </div>

            <div class="form-group">
                <label for="telefono">Teléfono:</label>
                <input type="text" name="telefono" value="{{ usuario.telefono }}" required>
            </div>

            <div class="form-group">
                <label for="email">Correo electrónico:</label>
                <input type="email" name="email" value="{{ usuario.email }}" required>
            </div>

            <div class="form-group">
                <label for="contrasena">Contraseña:</label>
                <input type="password" name="contrasena" value="{{ usuario.contrasena }}" required>
            </div>

            <div class="form-group">
                <label for="rol">Rol:</label>
                <select name="rol" required>
                    <option value="0" {% if usuario.rol == 0 %}selected{% endif %}>Usuario</option>
                    <option value="1" {% if usuario.rol == 1 %}selected{% endif %}>Administrador</option>
                </select>
            </div>

            <button type="submit">Actualizar</button>
        </form>
    </div>

    {% include 'footer.html' %}

</body>
</html>
